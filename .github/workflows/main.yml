name: VPS Profesional Permanente

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["VPS Profesional Permanente"]
    types: [completed]

jobs:
  vps-session:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: "1. Iniciar Webtop (14GB RAM)"
        run: |
          docker run -d -p 3000:3000 --name=webtop --security-opt seccomp=unconfined \
          -e PUID=1000 -e PGID=1000 -e TZ=America/Caracas --memory="14g" --shm-size="4gb" \
          lscr.io/linuxserver/webtop:ubuntu-xfce
          sleep 5

      - name: "2. Conexión Profesional Serveo"
        run: |
          # --- CONFIGURACIÓN ---
          TU_DOMINIO="Webtopt.qzz.io"
          # ---------------------

          echo "Conectando dominio $TU_DOMINIO a la VPS..."

          # Usamos un bucle por si la conexión SSH parpadea, que se reconecte sola
          # -R 80:localhost:3000 pide a Serveo que use el puerto 80 (HTTP) para tu dominio
          while true; do
            ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
                -R ${TU_DOMINIO}:80:localhost:3000 serveo.net || sleep 5
          done &

          echo "✅ SISTEMA ONLINE en: http://$TU_DOMINIO"
          echo "La barra de direcciones no cambiará. Es 100% profesional."

      - name: "3. Mantener y Relevar"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Esperar 5 horas y 50 minutos
          sleep 21000
          
          echo "⏰ Iniciando nueva sesión de relevo..."
          # Reemplaza 'main.yml' por el nombre de este archivo si es diferente
          gh workflow run "main.yml" --ref main
          
          # Dar 5 minutos de margen para que la otra VPS tome el control
          sleep 300
