name: VPS PROFESIONAL CLOUDFLARE LOOP

on:
  workflow_dispatch:

jobs:
  vps-session:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: "1. Preparar Webtop (14GB RAM)"
        run: |
          docker run -d -p 3000:3000 --name=webtop --security-opt seccomp=unconfined \
          -e PUID=1000 -e PGID=1000 -e TZ=America/Caracas --memory="14g" --shm-size="4gb" \
          lscr.io/linuxserver/webtop:ubuntu-xfce
          echo "Webtop iniciando..."
          sleep 10

      - name: "2. Iniciar Túnel y Actualizar Redirección"
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          MY_DOMAIN: "Webtopt.qzz.io"
        run: |
          # 1. Instalar Cloudflared
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

          # 2. Iniciar túnel aleatorio y guardar log
          cloudflared tunnel --url http://localhost:3000 > tunnel.log 2>&1 &
          
          echo "Generando túnel de Cloudflare..."
          sleep 20
          
          # 3. Extraer la URL de trycloudflare.com
          TUNNEL_URL=$(grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" tunnel.log | head -n 1)

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ No se pudo obtener la URL de Cloudflare."
            cat tunnel.log
            exit 1
          fi
          echo "✅ Túnel detectado: $TUNNEL_URL"

          # 4. Buscar el ID de la Page Rule en tu cuenta
          RULE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/pagerules" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            | jq -r --arg DOMAIN "$MY_DOMAIN/*" '.result[] | select(.targets[0].constraint.value == $DOMAIN) | .id')

          if [ -z "$RULE_ID" ] || [ "$RULE_ID" == "null" ]; then
            echo "❌ ERROR: No se encontró la Page Rule para $MY_DOMAIN/*"
            exit 1
          fi

          # 5. Actualizar la redirección de tu dominio al nuevo túnel
          curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/pagerules/$RULE_ID" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{
              "targets": [{"target": "url", "constraint": {"operator": "matches", "value": "'"$MY_DOMAIN"'/*"}}],
              "actions": [{"id": "forwarding_url", "value": {"url": "'"$TUNNEL_URL"'", "status_code": 302}}],
              "status": "active"
            }'
          
          echo "🎉 SISTEMA ONLINE EN: http://$MY_DOMAIN"

      - name: "3. Relevo Infinito"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Esperar 5 horas y 45 minutos (20700 segundos)
          sleep 20700
          
          echo "⏰ Iniciando nueva sesión..."
          # ⚠️ RECUERDA: El nombre del archivo debe ser 'main.yml' o el que tengas puesto
          gh workflow run "main.yml" --ref main
          
          # Margen de 10 min para que la nueva VPS tome el control
          sleep 600
