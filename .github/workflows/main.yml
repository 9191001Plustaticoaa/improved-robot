name: VPS Webtop - Totalmente Automatico

on:
  workflow_dispatch:

jobs:
  vps-session:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 Horas
    
    steps:
      - name: "1. Preparar Entorno"
        uses: actions/checkout@v4

      - name: "2. Desplegar Webtop (14GB RAM)"
        run: |
          docker run -d \
            --name=webtop \
            --security-opt seccomp=unconfined \
            -e PUID=1000 -e PGID=1000 \
            -e TZ=America/Caracas \
            -p 3000:3000 \
            --memory="14g" \
            --memory-swap="14g" \
            --shm-size="4gb" \
            lscr.io/linuxserver/webtop:ubuntu-xfce
          sleep 5

      - name: "3. Iniciar Tunel y Vincular Dominio"
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          DNS_NAME: ${{ secrets.DNS_RECORD_NAME }}
        run: |
          echo "Conectando con tunel directo..."
          
          # Abrimos el tunel SSH con localhost.run
          # Capturamos la salida para extraer el link generado
          ssh -o StrictHostKeyChecking=no -R 80:localhost:3000 nokey@localhost.run > tunnel_log.txt 2>&1 &
          
          sleep 10
          
          # Extraemos la URL (ejemplo: tunel-raro.lhr.life)
          TUNNEL_URL=$(grep -oE "[a-zA-Z0-9.-]+\.lhr\.life" tunnel_log.txt | head -n 1)

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Error: No se pudo obtener el link del tunel."
            cat tunnel_log.txt
            exit 1
          fi

          echo "✅ Link generado: $TUNNEL_URL"

          # Actualizamos Cloudflare con el nuevo link
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?name=$DNS_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')

          curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$RECORD_ID" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"type":"CNAME","name":"'"$DNS_NAME"'","content":"'"$TUNNEL_URL"'","ttl":1,"proxied":false}'

          echo "🎉 ¡LISTO! Acceso directo en: http://$DNS_NAME"

      - name: "4. Mantener vivo (5h 50m)"
        run: |
          echo "VPS funcionando. Entra a tu dominio sin contraseñas."
          # Espera casi las 6 horas
          sleep 21000 

      - name: "5. Reiniciar automaticamente"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "El tiempo se acaba, encendiendo la siguiente VPS..."
          # CAMBIA 'nombre_de_este_archivo.yml' por el nombre real de tu archivo
          gh workflow run "nombre_de_este_archivo.yml" --ref main
