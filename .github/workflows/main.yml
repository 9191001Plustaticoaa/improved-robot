name: VPS Webtop - DNS Auto-Update (No 1014)

on:
  workflow_dispatch:

jobs:
  vps-session:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 Horas
    
    steps:
      - name: "1. Preparar Entorno"
        uses: actions/checkout@v4

      - name: "2. Instalar Localtunnel"
        run: sudo npm install -g localtunnel

      - name: "3. Desplegar Webtop (14GB RAM)"
        run: |
          docker run -d \
            --name=webtop \
            --security-opt seccomp=unconfined \
            -e PUID=1000 -e PGID=1000 \
            -e TZ=America/Caracas \
            -p 3000:3000 \
            --memory="14g" \
            --memory-swap="14g" \
            --shm-size="4gb" \
            lscr.io/linuxserver/webtop:ubuntu-xfce
          sleep 10

      - name: "4. Generar Túnel + Actualizar Cloudflare"
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          DNS_NAME: ${{ secrets.DNS_RECORD_NAME }}
        run: |
          # 1. Iniciar localtunnel y guardar el link en un archivo
          lt --port 3000 > tunnel_info.txt 2>&1 &
          
          echo "Esperando link de Localtunnel..."
          sleep 10
          
          # 2. Extraer la URL (ejemplo: https://heavy-cars-run.loca.lt)
          # Limpiamos el texto para dejar solo el dominio sin https://
          RAW_URL=$(grep -o 'https://[^ ]*' tunnel_info.txt | head -n 1)
          CLEAN_URL=$(echo $RAW_URL | sed 's/https:\/\///')

          if [ -z "$CLEAN_URL" ]; then
            echo "❌ Error: No se pudo obtener el link de Localtunnel."
            cat tunnel_info.txt
            exit 1
          fi

          echo "✅ Nuevo link detectado: $CLEAN_URL"

          # 3. Buscar el ID del registro DNS Webtopt.qzz.io en Cloudflare
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?name=$DNS_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')

          if [ "$RECORD_ID" == "null" ]; then
            echo "❌ Error: El registro $DNS_NAME no existe en Cloudflare. Créalo manualmente primero."
            exit 1
          fi

          # 4. Actualizar el CNAME de Cloudflare para que apunte al nuevo link de Localtunnel
          # Usamos proxied: false (nube gris) para que funcione directo y rápido
          curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$RECORD_ID" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"type":"CNAME","name":"'"$DNS_NAME"'","content":"'"$CLEAN_URL"'","ttl":1,"proxied":false}'

          echo ""
          echo "🎉 ¡LISTO! Tu dominio $DNS_NAME ahora apunta a $CLEAN_URL"
          echo "🌍 Entra en: http://$DNS_NAME"

      - name: "5. Mantener Vivo (Bucle)"
        run: |
          echo "Sesión activa por 5h 50m."
          sleep 21000 

      - name: "6. Reiniciar (Loop Infinito)"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Tiempo agotado. Lanzando nueva sesión..."
          # Reemplaza 'main.yml' por el nombre de tu archivo .yml
          gh workflow run "main.yml" --ref main
